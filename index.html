<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子パーツ在庫ビューア</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="page-title">電子パーツ在庫ビューア</h1>
        
        <div id="status" class="status">初期化中...</div>
        
        <div id="tabs-container" style="display: none;">
            <div class="tabs">
                <div id="categories-tab" class="tab active">カテゴリ一覧</div>
                <div id="search-tab" class="tab">全パーツ検索</div>
            </div>
        </div>
        
        <div id="view-controls"></div>
        
        <div id="categories-view" class="view"></div>
        <div id="parts-view" class="view" style="display: none;"></div>
        <div id="search-view" class="view" style="display: none;"></div>
    </div>

    <!-- SQL.js ライブラリの読み込み -->
    <script>
        // SQL.js の読み込み設定
        window.SQL_JS_CONFIG = {
            locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    
    <!-- メインアプリケーション -->
    <script src="js/app.js"></script>
    
    <!-- 読み込み確認スクリプト -->
    <script>
        // SQL.js 読み込み確認
        console.log('SQL.js availability check:');
        console.log('initSqlJs:', typeof initSqlJs);
        console.log('window.SQL:', typeof window.SQL);
        
        // 読み込み完了の確認
        if (typeof initSqlJs === 'undefined') {
            console.error('SQL.js の読み込みに失敗しました');
            const statusElement = document.getElementById('status');
            if (statusElement) {
                statusElement.textContent = 'エラー: SQL.jsライブラリの読み込みに失敗しました。';
                statusElement.className = 'status error';
            }
        } else {
            console.log('SQL.js 読み込み確認完了');
        }
    </script>
</body>
</html>
