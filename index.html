<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子パーツ在庫ビューア</title>
    
    <!-- Content Security Policy（WebAssembly対応版） -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' https://cdnjs.cloudflare.com;
      img-src 'self' data:;
      object-src 'none';
      base-uri 'self';
    ">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="page-title">電子パーツ在庫ビューア</h1>
        
        <div id="status" class="status">初期化中...</div>
        
        <div id="tabs-container" style="display: none;">
            <div class="tabs">
                <div id="categories-tab" class="tab active">カテゴリ一覧</div>
                <div id="search-tab" class="tab">全パーツ検索</div>
            </div>
        </div>
        
        <div id="view-controls"></div>
        
        <div id="categories-view" class="view"></div>
        <div id="parts-view" class="view" style="display: none;"></div>
        <div id="search-view" class="view" style="display: none;"></div>
    </div>

    <!-- SQL.js ライブラリの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    
    <!-- メインアプリケーション -->
    <script src="js/app.js"></script>
</body>
</html>
