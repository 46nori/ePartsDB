<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子パーツ在庫ビューア</title>
    
    <!-- Content Security Policy（WebAssembly対応版） -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' https://cdnjs.cloudflare.com;
      img-src 'self' data:;
      object-src 'none';
      base-uri 'self';
    ">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="page-title">電子パーツ在庫ビューア</h1>
        
        <div id="status" class="status">初期化中...</div>
        
        <!-- 環境インジケーターはJavaScriptで動的挿入 -->
        
        <div id="tabs-container" style="display: none;">
            <div class="tabs">
                <button id="categories-tab" class="tab active">
                  カテゴリ
                </button>
                <button id="search-tab" class="tab">
                  全パーツ検索
                </button>
            </div>
        </div>
        
        <div id="view-controls"></div>
        
        <div id="categories-view" class="view">
            <div class="category-container">
                <!-- カテゴリがここに表示されます -->
            </div>
        </div>
        
        <div id="parts-view" class="view" style="display: none;">
            <!-- パーツ一覧がここに表示されます -->
        </div>
        
        <div id="search-view" class="view" style="display: none;">
            <!-- 検索機能がここに表示されます -->
        </div>
    </div>

    <!-- SQL.js ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    
    <!-- Phase 1: 基盤モジュール -->
    <script src="js/config.js"></script>
    <script src="js/utils.js?v=20250608001"></script>
    <script src="js/app-state.js"></script>

    <!-- Phase 2: 機能モジュール -->
    <script src="js/local-database.js?v=20250608001"></script>
    <script src="js/part-dialogs.js?v=20250609001"></script>  <!-- 統合版 -->

    <!-- Phase 3: メインアプリケーション -->
    <script src="js/app.js?v=20250608001"></script>
</body>
</html>
