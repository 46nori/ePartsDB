<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子パーツ在庫ビューア</title>
  
  <!-- CSS ファイルの読み込み -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- SQL.js ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js" defer></script>
  
  <!-- アプリケーション JavaScript -->
  <script src="js/app.js" defer></script>
</head>
<body>
  <h1 id="page-title">電子パーツ在庫ビューア</h1>
  
  <div id="view-controls">
    <!-- ビュー切り替えコントロールはJavaScriptで動的に生成されます -->
  </div>
  
  <div id="status" class="status loading">データベースを読み込み中...</div>
  
  <!-- タブコンテナ -->
  <div id="tabs-container" style="display:none;">
    <div class="tabs">
      <div id="categories-tab" class="tab active">カテゴリ一覧</div>
      <div id="search-tab" class="tab">全パーツ検索</div>
    </div>
  </div>
  
  <div id="categories-view"></div>
  <div id="parts-view" style="display:none;"></div>
  <div id="search-view" style="display:none;"></div>
</body>
</html>
